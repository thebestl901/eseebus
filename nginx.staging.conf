# Staging / debug instance (HTTP only, mapped to host DEBUG_PORT)
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    resolver 127.0.0.11 valid=30s ipv6=off;

    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_connect_timeout 15s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header X-ESeebus-Env "staging" always;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 'staging-ok';
    }

    location /api/kmb/ {
        proxy_pass https://data.etabus.gov.hk/v1/transport/kmb/;
        proxy_set_header Host data.etabus.gov.hk;
        add_header Access-Control-Allow-Origin * always;
    }

    location /api/citybus/ {
        proxy_pass https://rt.data.gov.hk/v2/transport/citybus/;
        proxy_set_header Host rt.data.gov.hk;
        add_header Access-Control-Allow-Origin * always;
    }

    location /api/gmb/ {
        proxy_pass https://data.etagmb.gov.hk/;
        proxy_set_header Host data.etagmb.gov.hk;
        add_header Access-Control-Allow-Origin * always;
    }

    location /api/hko/ {
        proxy_pass https://data.weather.gov.hk/;
        proxy_set_header Host data.weather.gov.hk;
        add_header Access-Control-Allow-Origin * always;
    }

    location ~* \.(js|css|png|svg|ico|woff2|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
