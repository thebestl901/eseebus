# Cloudflare proxy IP ranges (for real client IP)
# https://www.cloudflare.com/ips/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    listen 443 ssl;
    server_name ezhkbus.app www.ezhkbus.app;

    ssl_certificate /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    resolver 127.0.0.11 valid=30s ipv6=off;

    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_connect_timeout 15s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    location /api/kmb/ {
        proxy_pass https://data.etabus.gov.hk/v1/transport/kmb/;
        proxy_set_header Host data.etabus.gov.hk;
        add_header Access-Control-Allow-Origin * always;
    }

    location /api/citybus/ {
        proxy_pass https://rt.data.gov.hk/v2/transport/citybus/;
        proxy_set_header Host rt.data.gov.hk;
        add_header Access-Control-Allow-Origin * always;
    }

    location /api/gmb/ {
        proxy_pass https://data.etagmb.gov.hk/;
        proxy_set_header Host data.etagmb.gov.hk;
        add_header Access-Control-Allow-Origin * always;
    }

    location ~* \.(js|css|png|svg|ico|woff2|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
